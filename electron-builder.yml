appId: com.pagescms.desktop
productName: GitHub Pages CMS
electronEntryPoint: electron/main.js

directories:
  output: dist-electron

files:
  - app.js
  - electron/**
  - config/**
  - routes/**
  - services/**
  - middleware/**
  - models/**
  - public/**
  - node_modules/**
  - "!client/**"
  - "!docs/**"
  - "!dist-electron/**"

asarUnpack:
  - "node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3/build/Release/**"
  - "node_modules/better-sqlite3/build/Release/**"
  - "config/config.env"

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  # icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: GitHub Pages CMS
